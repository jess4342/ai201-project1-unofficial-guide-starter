<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .stage { rx: 12; ry: 12; stroke-width: 2; }
      .num   { font-size: 13px; font-weight: 700; fill: #ffffff; }
      .title { font-size: 17px; font-weight: 700; fill: #0f172a; }
      .desc  { font-size: 13px; fill: #334155; }
      .tool  { font-size: 12px; font-style: italic; fill: #1e3a8a; }
      .term  { font-size: 14px; font-weight: 700; fill: #ffffff; }
      .edge  { stroke: #475569; stroke-width: 2.5; fill: none; }
      .badge { fill: #1e293b; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="760" fill="#f8fafc"/>
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">The Unofficial Guide — RAG Pipeline</text>
  <text x="450" y="64" text-anchor="middle" font-size="14" fill="#64748b">Bellevue apartment reviews · Yelp + ApartmentRatings</text>

  <!-- Stage 1: Ingestion -->
  <rect class="stage" x="250" y="90" width="400" height="80" fill="#eff6ff" stroke="#3b82f6"/>
  <circle cx="280" cy="118" r="14" fill="#3b82f6"/>
  <text class="num" x="280" y="123" text-anchor="middle">1</text>
  <text class="title" x="308" y="118">Document Ingestion</text>
  <text class="desc"  x="308" y="138">Yelp + ApartmentRatings reviews → raw text files</text>
  <text class="tool"  x="308" y="158">one doc per review, with source metadata</text>

  <!-- Stage 2: Chunking -->
  <rect class="stage" x="250" y="210" width="400" height="80" fill="#ecfeff" stroke="#06b6d4"/>
  <circle cx="280" cy="238" r="14" fill="#06b6d4"/>
  <text class="num" x="280" y="243" text-anchor="middle">2</text>
  <text class="title" x="308" y="238">Chunking</text>
  <text class="desc"  x="308" y="258">600-char chunks · 80-char overlap</text>
  <text class="tool"  x="308" y="278">Python chunk_text()</text>

  <!-- Stage 3: Embedding + Vector Store -->
  <rect class="stage" x="250" y="330" width="400" height="80" fill="#f0fdf4" stroke="#22c55e"/>
  <circle cx="280" cy="358" r="14" fill="#22c55e"/>
  <text class="num" x="280" y="363" text-anchor="middle">3</text>
  <text class="title" x="308" y="358">Embedding + Vector Store</text>
  <text class="desc"  x="308" y="378">all-MiniLM-L6-v2 (sentence-transformers)</text>
  <text class="tool"  x="308" y="398">embeddings persisted in ChromaDB</text>

  <!-- Stage 4: Retrieval -->
  <rect class="stage" x="250" y="450" width="400" height="80" fill="#fefce8" stroke="#eab308"/>
  <circle cx="280" cy="478" r="14" fill="#eab308"/>
  <text class="num" x="280" y="483" text-anchor="middle">4</text>
  <text class="title" x="308" y="478">Retrieval</text>
  <text class="desc"  x="308" y="498">embed query · top-k = 4 similarity search</text>
  <text class="tool"  x="308" y="518">ChromaDB</text>

  <!-- Stage 5: Generation -->
  <rect class="stage" x="250" y="570" width="400" height="80" fill="#fdf2f8" stroke="#ec4899"/>
  <circle cx="280" cy="598" r="14" fill="#ec4899"/>
  <text class="num" x="280" y="603" text-anchor="middle">5</text>
  <text class="title" x="308" y="598">Generation</text>
  <text class="desc"  x="308" y="618">grounded answer from retrieved chunks</text>
  <text class="tool"  x="308" y="638">Groq-hosted LLM (Llama 3.x)</text>

  <!-- Main flow edges -->
  <path class="edge" d="M 450 170 L 450 210" marker-end="url(#arrow)"/>
  <path class="edge" d="M 450 290 L 450 330" marker-end="url(#arrow)"/>
  <path class="edge" d="M 450 410 L 450 450" marker-end="url(#arrow)"/>
  <path class="edge" d="M 450 530 L 450 570" marker-end="url(#arrow)"/>

  <!-- User query terminal -> Retrieval -->
  <rect class="badge" x="40" y="468" width="150" height="44" rx="22" ry="22"/>
  <text class="term" x="115" y="495" text-anchor="middle">User query</text>
  <path class="edge" d="M 190 490 L 250 490" marker-end="url(#arrow)"/>

  <!-- Answer terminal out of Generation -->
  <rect class="badge" x="700" y="588" width="170" height="44" rx="22" ry="22"/>
  <text class="term" x="785" y="608" text-anchor="middle">Answer +</text>
  <text class="term" x="785" y="625" text-anchor="middle">source attribution</text>
  <path class="edge" d="M 650 610 L 700 610" marker-end="url(#arrow)"/>

  <!-- Offline / online divider note -->
  <text x="670" y="270" font-size="12" fill="#94a3b8" font-style="italic">offline: build the index</text>
  <text x="670" y="490" font-size="12" fill="#94a3b8" font-style="italic">online: answer queries</text>
</svg>
